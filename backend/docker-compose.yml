version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aicrm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aicrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/aicrm
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      MODEL_PATH: /app/models
      API_KEY: dev-key-change-in-prod
    volumes:
      - ai_models:/app/models
    depends_on:
      - db

volumes:
  pgdata:
  ai_models:

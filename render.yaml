services:
  - type: web
    name: ai-crm-api
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-crm-redis
          property: port
      - key: REDIS_URL
        fromService:
          type: redis
          name: ai-crm-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: ai-crm-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: AI_SERVICE_URL
        value: http://ai-crm-ai:8001

  - type: web
    name: ai-crm-ai
    env: docker
    dockerfilePath: ai-service/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: API_KEY
        generateValue: true

  - type: web
    name: ai-crm-frontend
    env: node
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://ai-crm-api.onrender.com

  - type: keyvalue
    name: ai-crm-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all
